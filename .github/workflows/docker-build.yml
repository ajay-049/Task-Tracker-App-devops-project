name: Build and Push All Images

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest 

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 1. Pehle BACKEND ki image banegi aur push hogi
    - name: Build and Push Backend Image
      uses: docker/build-push-action@v4
      with:
        context: ./backend  # Backend wale folder mein jaakar build karega
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/task-tracker-backend:latest 

    # 2. Phir FRONTEND ki image banegi aur push hogi
    - name: Build and Push Frontend Image
      uses: docker/build-push-action@v4
      with:
        context: ./frontend  # Frontend wale folder mein jaakar build karega
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/task-tracker-frontend:latest